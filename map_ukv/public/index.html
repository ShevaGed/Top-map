<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map-ukv</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

 <div id="controls" class="control-panel">
    <div class="input-group">
        <label>📡 Висота щогли (м)</label>
        <input type="number" id="antenna-height" value="10">
    </div>

    <div class="input-group">
        <label>🚶 Висота рації (м)</label>
        <input type="number" id="user-height" value="1.7" step="0.1">
    </div>

    <div class="input-group slider-group">
        <label>📏 Радіус: <span id="dist-val">35</span> км</label>
        <input type="range" id="scan-dist" min="5" max="50" value="35" 
               oninput="document.getElementById('dist-val').innerText = this.value">
    </div>

    <button id="clear-btn" class="btn-danger">🗑 Очистити карту</button>
    
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
        <span>Обробка рельєфу...</span>
    </div>
 </div>

<div id="map-id"></div>  


    <script src="/js/main.js"></script>

</body>
</html>
