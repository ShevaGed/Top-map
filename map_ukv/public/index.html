<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>map-ukv</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<body>
    <div id="controls" class="control-panel">
        
        <div class="controls-left">
            <div class="input-group">
                <label>📡 Висота щогли (м)</label>
                <input type="number" id="antenna-height" value="10">
            </div>

            <div class="input-group">
                <label>🚶 Висота рації (м)</label>
                <input type="number" id="user-height" value="1.7" step="0.1">
            </div>

	    <div class="input-group slider-group">
	      <label>📏 Радіус: <span id="dist-val">50</span> км</label>
	      <input type="range" id="scan-dist" min="5" max="50" value="50" 
		     oninput="document.getElementById('dist-val').innerText = this.value">
	    </div>

            <div class="input-group">
                <label>📡 Діапазон</label>
                <select id="freq-select">
                    <option value="140">VHF (140 MHz)</option>
                    <option value="440">UHF (440 MHz)</option>
                </select>
            </div>
        </div>

        <div class="controls-right">
            <button id="export-btn" class="btn btn-success">💾 Експорт JSON</button>
            <button id="save-db-btn" class="btn btn-primary">🗄 Зберегти в БД</button>
            <button id="clear-btn" class="btn btn-danger">🗑 Очистити карту</button>
        </div>
    </div>

    <div id="map-id"></div>
    
    <div id="map-id"></div>  

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <span>Обробка рельєфу...</span>
    </div>

    <div id="history-container" class="history-widget">
      <h3>Історія розрахунків</h3>
      <div class="history-scroll-area">
        <table id="history-table">
          <thead>
            <tr>
              <th>Дата</th>
              <th>МГц</th>
              <th>Висоти</th>
            </tr>
          </thead>
          <tbody id="history-body">
            </tbody>
        </table>
      </div>
    </div>

    <script src="/js/main.js"></script>


</body>
</html>
